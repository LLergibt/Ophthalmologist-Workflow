services:
  backend:
    build:
      context: ./backend
    container_name: ophthalmology-backend
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
    container_name: ophthalmology-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080
    depends_on:
      - backend
